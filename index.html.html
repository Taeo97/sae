<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HISAE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap');

  :root{
    --cream:#FFF8F0;
    --coral:#FF9A8B;
    --coral-dark:#E37C6E;
    --sage:#A8D5BA;
    --sage-dark:#7AB596;
    --brown:#8B6F5C;
    --brown-light:#C9B8AC;
    --mustard:#FFC857;
    --ink:#5B4A3F;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Nunito', sans-serif;
    background:linear-gradient(135deg, #FCE9E0 0%, #FFF8F0 50%, #EAF3E4 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--ink);
  }
  .phone{
    width:390px;
    height:780px;
    background:var(--cream);
    border-radius:40px;
    box-shadow:0 20px 60px rgba(139,111,92,0.25);
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    border:8px solid #fff;
  }
  .statusbar{
    height:44px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
    font-size:14px;
    font-weight:700;
    color:var(--ink);
  }
  .header{
    padding:6px 24px 16px;
    flex-shrink:0;
  }
  .header h1{
    font-family:'Fredoka', sans-serif;
    font-size:28px;
    font-weight:700;
    color:var(--coral-dark);
    letter-spacing:1px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .header .sub{
    font-size:13px;
    color:var(--brown);
    margin-top:2px;
    font-weight:600;
  }
  .content{
    flex:1;
    overflow-y:auto;
    padding:0 20px 100px;
  }
  .content::-webkit-scrollbar{display:none;}

  /* Cards */
  .card{
    background:var(--card);
    border-radius:22px;
    padding:18px 20px;
    margin-bottom:14px;
    box-shadow:0 4px 16px rgba(139,111,92,0.07);
  }
  .card-title{
    font-family:'Fredoka', sans-serif;
    font-size:16px;
    font-weight:600;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
  }
  .card-title .icon{
    width:30px; height:30px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    flex-shrink:0;
  }
  .icon-coral{background:#FFE6E1; color:var(--coral-dark);}
  .icon-sage{background:#E3F2E8; color:var(--sage-dark);}
  .icon-mustard{background:#FFF3D6; color:#B8862E;}
  .icon-brown{background:#F1E7DE; color:var(--brown);}

  /* Profile / hero */
  .hero{
    background:linear-gradient(135deg, var(--coral) 0%, #FFB4A8 100%);
    border-radius:24px;
    padding:20px;
    margin-bottom:16px;
    color:#fff;
    position:relative;
    overflow:hidden;
  }
  .hero-row{display:flex; align-items:center; gap:14px;}
  .hero-avatar{
    width:58px; height:58px;
    border-radius:50%;
    background:rgba(255,255,255,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    flex-shrink:0;
  }
  .hero-name{font-family:'Fredoka', sans-serif; font-size:20px; font-weight:700;}
  .hero-meta{font-size:12.5px; opacity:0.95; margin-top:2px; font-weight:600;}

  /* D-day chips */
  .dday-scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:4px;
    margin-bottom:14px;
  }
  .dday-scroll::-webkit-scrollbar{display:none;}
  .dday-chip{
    flex-shrink:0;
    background:var(--card);
    border-radius:18px;
    padding:12px 16px;
    min-width:110px;
    box-shadow:0 4px 16px rgba(139,111,92,0.07);
    border:2px solid transparent;
  }
  .dday-chip.urgent{border-color:var(--coral);}
  .dday-num{
    font-family:'Fredoka', sans-serif;
    font-size:22px;
    font-weight:700;
    color:var(--coral-dark);
  }
  .dday-chip.urgent .dday-num{color:var(--coral-dark);}
  .dday-label{font-size:12px; font-weight:700; color:var(--ink); margin-top:2px;}
  .dday-date{font-size:10.5px; color:var(--brown-light); margin-top:1px; font-weight:600;}

  /* List items */
  .list-item{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:10px 0;
    border-bottom:1px solid #F5EEE6;
    font-size:13.5px;
  }
  .list-item:last-child{border-bottom:none;}
  .list-item .label{font-weight:700; color:var(--ink);}
  .list-item .value{color:var(--brown); text-align:right; font-weight:600;}
  .list-item .desc{
    font-size:12px; color:var(--brown-light); margin-top:3px;
    font-weight:400; line-height:1.5;
  }
  .list-item .left{flex:1; padding-right:10px;}

  .empty{
    text-align:center;
    padding:24px 0;
    color:var(--brown-light);
    font-size:13px;
    font-weight:600;
  }
  .empty .icon{font-size:30px; display:block; margin-bottom:8px;}

  /* Tags */
  .tag{
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:#F1E7DE;
    color:var(--brown);
    font-size:11px;
    font-weight:700;
    padding:4px 10px;
    border-radius:12px;
    margin-right:6px;
    margin-top:4px;
  }
  .poop-swatch{
    width:14px; height:14px;
    border-radius:50%;
    display:inline-block;
    border:1px solid rgba(0,0,0,0.08);
  }

  /* Bottom nav */
  .navbar{
    position:absolute;
    bottom:0; left:0; right:0;
    height:78px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-around;
    border-top:1px solid #F0E6DC;
    padding-bottom:14px;
    box-shadow:0 -4px 16px rgba(139,111,92,0.06);
  }
  .nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    color:var(--brown-light);
    font-size:10.5px;
    font-weight:700;
    cursor:pointer;
    transition:color 0.2s, transform 0.2s;
    background:none; border:none;
    padding:6px 4px;
  }
  .nav-item .nav-icon{
    font-size:19px;
    transition:transform 0.2s;
  }
  .nav-item.active{color:var(--coral-dark);}
  .nav-item.active .nav-icon{transform:translateY(-2px) scale(1.1);}
  .paw-indicator{
    position:absolute;
    top:2px;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--coral);
    opacity:0;
    transition:opacity 0.2s;
  }
  .nav-item.active .paw-indicator{opacity:1;}

  /* FAB */
  .fab{
    position:absolute;
    bottom:92px; right:20px;
    width:54px; height:54px;
    border-radius:50%;
    background:var(--coral);
    color:#fff;
    border:none;
    font-size:26px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(255,154,139,0.45);
    cursor:pointer;
    transition:transform 0.15s;
    z-index:20;
  }
  .fab:active{transform:scale(0.92);}

  /* Section title */
  .section-title{
    font-family:'Fredoka', sans-serif;
    font-size:18px;
    font-weight:600;
    color:var(--ink);
    margin:18px 0 10px;
  }
  .section-title:first-child{margin-top:6px;}

  /* Modal */
  .modal-overlay{
    position:absolute;
    inset:0;
    background:rgba(91,74,63,0.35);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:100;
    border-radius:32px;
  }
  .modal-sheet{
    background:var(--cream);
    width:100%;
    border-radius:28px 28px 0 0;
    padding:20px 22px 28px;
    max-height:88%;
    overflow-y:auto;
    animation:slideUp 0.25s ease-out;
  }
  @keyframes slideUp{ from{transform:translateY(40px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .modal-handle{
    width:36px; height:4px;
    background:var(--brown-light);
    border-radius:4px;
    margin:0 auto 16px;
  }
  .modal-title{
    font-family:'Fredoka', sans-serif;
    font-size:19px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:16px;
  }
  .form-group{margin-bottom:14px;}
  .form-group label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color:var(--brown);
    margin-bottom:6px;
  }
  .req{color:var(--coral-dark);}
  .form-group input, .form-group textarea, .form-group select{
    width:100%;
    border:2px solid #F0E6DC;
    border-radius:14px;
    padding:11px 13px;
    font-family:'Nunito', sans-serif;
    font-size:14px;
    font-weight:600;
    color:var(--ink);
    background:#fff;
    outline:none;
    transition:border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus{
    border-color:var(--coral);
  }
  .form-group textarea{resize:none; font-weight:400; line-height:1.5;}
  .form-row{display:flex; gap:10px;}
  .form-row .form-group{flex:1;}

  .color-options{display:flex; gap:10px; flex-wrap:wrap;}
  .color-opt{
    width:38px; height:38px;
    border-radius:50%;
    cursor:pointer;
    border:3px solid transparent;
    transition:border-color 0.15s, transform 0.15s;
  }
  .color-opt.selected{border-color:var(--ink); transform:scale(1.1);}

  .btn-primary{
    width:100%;
    background:var(--coral);
    color:#fff;
    border:none;
    border-radius:16px;
    padding:14px;
    font-family:'Fredoka', sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:6px;
    transition:transform 0.15s, background 0.15s;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-cancel{
    width:100%;
    background:none;
    color:var(--brown);
    border:none;
    padding:10px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    margin-top:4px;
  }
  .type-toggle{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .type-btn{
    flex:1;
    min-width:80px;
    text-align:center;
    padding:9px 10px;
    border-radius:14px;
    border:2px solid #F0E6DC;
    background:#fff;
    font-size:12.5px;
    font-weight:700;
    color:var(--brown);
    cursor:pointer;
    transition:all 0.15s;
  }
  .type-btn.active{
    border-color:var(--coral);
    background:#FFE6E1;
    color:var(--coral-dark);
  }
  .delete-btn{
    background:none; border:none; color:var(--brown-light);
    font-size:16px; cursor:pointer; padding:4px;
    flex-shrink:0;
  }
  .item-row{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}

  @media (max-width:420px){
    body{padding:0;}
    .phone{width:100vw; height:100vh; border-radius:0; border:none;}
  }
</style>

3px;">사료/간식</span></button><button class="card" style="display: flex; align-items: center; gap: 10px; cursor: pointer; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; text-align: left; width: 100%;"><span class="icon icon-coral" style="flex-shrink: 0;"><i class="ti ti-heart"></i></span><span style="font-weight: 700; font-size: 13px;">건강 기록</span></button><button class="card" style="display: flex; align-items: center; gap: 10px; cursor: pointer; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; text-align: left; width: 100%;"><span class="icon icon-brown" style="flex-shrink: 0;"><i class="ti ti-calendar-plus"></i></span><span style="font-weight: 700; font-size: 13px;">디데이 추가</span></button></div></div></div><div class="navbar"><button class="nav-item active"><span class="paw-indicator"></span><span class="nav-icon"><i class="ti ti-home-2"></i></span><span>홈</span></button><button class="nav-item "><span class="paw-indicator"></span><span class="nav-icon"><i class="ti ti-map-pin"></i></span><span>산책</span></button><button class="nav-item "><span class="paw-indicator"></span><span class="nav-icon"><i class="ti ti-bone"></i></span><span>식사</span></button><button class="nav-item "><span class="paw-indicator"></span><span class="nav-icon"><i class="ti ti-heart"></i></span><span>건강</span></button><button class="nav-item "><span class="paw-indicator"></span><span class="nav-icon"><i class="ti ti-building-hospital"></i></span><span>방문</span></button></div></div></div>

<script src="./HISAE_files/react.production.min.js.다운로드"></script>
<script src="./HISAE_files/react-dom.production.min.js.다운로드"></script>
<script src="./HISAE_files/babel.min.js.다운로드"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ---------- helpers ----------
const todayStr = () => {
  const d = new Date();
  return d.toISOString().slice(0,10);
};
const formatDate = (s) => {
  if(!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
};
const daysUntil = (dateStr) => {
  const today = new Date(todayStr() + 'T00:00:00');
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - today) / (1000*60*60*24));
};

const POOP_COLORS = [
  { name:'갈색(정상)', hex:'#A0744F' },
  { name:'진갈색', hex:'#6F4E37' },
  { name:'노란색', hex:'#E8C547' },
  { name:'초록색', hex:'#7FAE5C' },
  { name:'검은색', hex:'#3A332E' },
  { name:'붉은색', hex:'#C0463C' },
  { name:'회색/흰색', hex:'#D9D2C7' },
];

const VISIT_TYPES = ['병원', '미용', '호텔', '기타'];
const HEALTH_TYPES = ['건강', '행동'];

// ---------- main app ----------
function App(){
  const [tab, setTab] = useState('home');
  const [modal, setModal] = useState(null); // { type: 'walk' | 'food' | 'health' | 'dday' | 'visit' }
  const [loaded, setLoaded] = useState(false);

  const [petName, setPetName] = useState('하늘');

  const [walks, setWalks] = useState([]);
  const [foods, setFoods] = useState([]);
  const [healthLogs, setHealthLogs] = useState([]);
  const [ddays, setDdays] = useState([]);
  const [visits, setVisits] = useState([]);

  // ---- load from storage ----
  useEffect(() => {
    (async () => {
      try {
        const saved = localStorage.getItem('hisae-data');
        if(saved){
          const data = JSON.parse(saved);
          setPetName(data.petName || '하늘');
          setWalks(data.walks || []);
          setFoods(data.foods || []);
          setHealthLogs(data.healthLogs || []);
          setDdays(data.ddays || []);
          setVisits(data.visits || []);
        }
      } catch(e) {
        // no existing data, start fresh
      }
      setLoaded(true);
    })();
  }, []);

  // ---- save to storage ----
  useEffect(() => {
    if(!loaded) return;
    const save = async () => {
      try {
        localStorage.setItem('hisae-data', JSON.stringify({
          petName, walks, foods, healthLogs, ddays, visits
        }));
      } catch(e) {
        console.error('save failed', e);
      }
    };
    save();
  }, [petName, walks, foods, healthLogs, ddays, visits, loaded]);

  const addItem = (list, setList, item) => {
    setList([{ ...item, id: Date.now() }, ...list]);
  };
  const removeItem = (list, setList, id) => {
    setList(list.filter(x => x.id !== id));
  };

  const sortedDdays = [...ddays].sort((a,b) => daysUntil(a.date) - daysUntil(b.date));

  return (
    <div className="phone">
      <div className="statusbar">
        <span>9:41</span>
        <span><i className="ti ti-paw"></i></span>
      </div>

      <div className="content">
        {tab === 'home' && (
          <Home
            petName={petName}
            setPetName={setPetName}
            ddays={sortedDdays}
            walks={walks}
            healthLogs={healthLogs}
            onOpenModal={setModal}
          />
        )}
        {tab === 'walk' && (
          <ListPage
            title="산책 기록"
            icon="ti-map-pin"
            iconClass="icon-sage"
            items={walks}
            onDelete={(id) => removeItem(walks, setWalks, id)}
            empty="아직 산책 기록이 없어요"
            render={(w) => (
              <div className="list-item">
                <div className="left">
                  <div className="label">{formatDate(w.date)} · {w.route || '경로 미입력'}</div>
                  <div className="desc">{w.duration ? `${w.duration}분` : ''}{w.duration && w.note ? ' · ' : ''}{w.note}</div>
                </div>
                <button className="delete-btn" onClick={() => removeItem(walks, setWalks, w.id)}><i className="ti ti-trash"></i></button>
              </div>
            )}
          />
        )}
        {tab === 'food' && (
          <ListPage
            title="사료 & 간식"
            icon="ti-bone"
            iconClass="icon-mustard"
            items={foods}
            onDelete={(id) => removeItem(foods, setFoods, id)}
            empty="등록된 사료/간식이 없어요"
            render={(f) => (
              <div className="list-item">
                <div className="left">
                  <div className="label">{f.name} <span className="tag">{f.type}</span></div>
                  <div className="desc">{formatDate(f.date)}{f.amount ? ` · ${f.amount}` : ''}{f.note ? ` · ${f.note}` : ''}</div>
                </div>
                <button className="delete-btn" onClick={() => removeItem(foods, setFoods, f.id)}><i className="ti ti-trash"></i></button>
              </div>
            )}
          />
        )}
        {tab === 'health' && (
          <HealthPage
            healthLogs={healthLogs}
            onDelete={(id) => removeItem(healthLogs, setHealthLogs, id)}
          />
        )}
        {tab === 'visit' && (
          <ListPage
            title="방문 기록"
            icon="ti-building-hospital"
            iconClass="icon-coral"
            items={visits}
            onDelete={(id) => removeItem(visits, setVisits, id)}
            empty="병원·미용·호텔 방문 기록이 없어요"
            render={(v) => (
              <div className="list-item">
                <div className="left">
                  <div className="label">{formatDate(v.date)} <span className="tag">{v.type}</span></div>
                  {v.place && <div className="desc" style={{marginTop:4, fontWeight:600, color:'var(--ink)'}}>{v.place}</div>}
                  <div className="desc">{v.detail}</div>
                  {v.cost && <div className="desc" style={{marginTop:4}}>비용: {Number(v.cost).toLocaleString()}원</div>}
                </div>
                <button className="delete-btn" onClick={() => removeItem(visits, setVisits, v.id)}><i className="ti ti-trash"></i></button>
              </div>
            )}
          />
        )}
      </div>

      {/* FAB */}
      {tab !== 'home' && (
        <button className="fab" onClick={() => setModal({ type: tab })} aria-label="추가">
          <i className="ti ti-plus"></i>
        </button>
      )}

      {/* Bottom nav */}
      <div className="navbar">
        <NavBtn icon="ti-home-2" label="홈" active={tab==='home'} onClick={() => setTab('home')} />
        <NavBtn icon="ti-map-pin" label="산책" active={tab==='walk'} onClick={() => setTab('walk')} />
        <NavBtn icon="ti-bone" label="식사" active={tab==='food'} onClick={() => setTab('food')} />
        <NavBtn icon="ti-heart" label="건강" active={tab==='health'} onClick={() => setTab('health')} />
        <NavBtn icon="ti-building-hospital" label="방문" active={tab==='visit'} onClick={() => setTab('visit')} />
      </div>

      {/* Modals */}
      {modal && (
        <ModalRouter
          modal={modal}
          onClose={() => setModal(null)}
          petName={petName}
          setPetName={setPetName}
          addWalk={(item) => addItem(walks, setWalks, item)}
          addFood={(item) => addItem(foods, setFoods, item)}
          addHealth={(item) => addItem(healthLogs, setHealthLogs, item)}
          addDday={(item) => addItem(ddays, setDdays, item)}
          addVisit={(item) => addItem(visits, setVisits, item)}
        />
      )}
    </div>
  );
}

function NavBtn({ icon, label, active, onClick }){
  return (
    <button className={`nav-item ${active ? 'active' : ''}`} onClick={onClick}>
      <span className="paw-indicator"></span>
      <span className="nav-icon"><i className={`ti ${icon}`}></i></span>
      <span>{label}</span>
    </button>
  );
}

// ---------- Home ----------
function Home({ petName, setPetName, ddays, walks, healthLogs, onOpenModal }){
  const [editingName, setEditingName] = useState(false);
  const [nameInput, setNameInput] = useState(petName);

  const recentWeight = healthLogs.filter(h => h.weight).sort((a,b) => b.date.localeCompare(a.date))[0];
  const lastWalk = walks[0];

  return (
    <div>
      <div className="hero">
        <div className="hero-row">
          <div className="hero-avatar" style={{overflow:'hidden'}}>
{localStorage.getItem('hisae-profile')
 ? <img src={localStorage.getItem('hisae-profile')} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
 : <i className="ti ti-dog"></i>}
</div>
          <div style={{flex:1}}>
            {editingName ? (
              <input
                value={nameInput}
                onChange={e => setNameInput(e.target.value)}
                onBlur={() => { setPetName(nameInput.trim() || petName); setEditingName(false); }}
                onKeyDown={e => { if(e.key==='Enter'){ setPetName(nameInput.trim() || petName); setEditingName(false); } }}
                autoFocus
                style={{
                  background:'rgba(255,255,255,0.9)', border:'none', borderRadius:10,
                  padding:'6px 10px', fontFamily:'Fredoka, sans-serif', fontSize:18, fontWeight:700,
                  color:'var(--coral-dark)', width:'100%'
                }}
              />
            ) : (
              <div className="hero-name" onClick={() => setEditingName(true)} style={{cursor:'pointer'}}>
                {petName} <i className="ti ti-pencil" style={{fontSize:13, opacity:0.8}}></i>
              </div>
            )}
            <div className="hero-meta">오늘도 좋은 하루 보내요 🐾</div>
<input type="file" accept="image/*"
onChange={(e)=>{const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{localStorage.setItem('hisae-profile',r.result); location.reload();}; r.readAsDataURL(f);}}
style={{marginTop:'8px',fontSize:'12px'}} />

          </div>
        </div>
      </div>

      <div className="section-title">디데이</div>
      {ddays.length === 0 ? (
        <div className="card">
          <div className="empty">
            <span className="icon"><i className="ti ti-calendar-event"></i></span>
            등록된 디데이가 없어요<br/>방문 탭에서 일정을 추가해보세요
          </div>
        </div>
      ) : (
        <div className="dday-scroll">
          {ddays.map(d => {
            const diff = daysUntil(d.date);
            return (
              <div key={d.id} className={`dday-chip ${diff <= 3 && diff >= 0 ? 'urgent' : ''}`}>
                <div className="dday-num">{diff === 0 ? 'D-DAY' : diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`}</div>
                <div className="dday-label">{d.title}</div>
                <div className="dday-date">{formatDate(d.date)}</div>
              </div>
            );
          })}
        </div>
      )}

      <div className="section-title">오늘의 요약</div>
      <div className="card">
        <div className="card-title">
          <span className="icon icon-sage"><i className="ti ti-map-pin"></i></span>
          최근 산책
        </div>
        {lastWalk ? (
          <div className="list-item" style={{paddingTop:0}}>
            <div className="left">
              <div className="label">{formatDate(lastWalk.date)} · {lastWalk.route || '경로 미입력'}</div>
              <div className="desc">{lastWalk.duration ? `${lastWalk.duration}분` : ''}</div>
            </div>
          </div>
        ) : <div className="empty" style={{padding:'8px 0'}}>기록이 없어요</div>}
      </div>

      <div className="card">
        <div className="card-title">
          <span className="icon icon-coral"><i className="ti ti-scale"></i></span>
          최근 체중
        </div>
        {recentWeight ? (
          <div className="list-item" style={{paddingTop:0}}>
            <div className="left">
              <div className="label">{recentWeight.weight}kg</div>
              <div className="desc">{formatDate(recentWeight.date)} 측정</div>
            </div>
          </div>
        ) : <div className="empty" style={{padding:'8px 0'}}>체중 기록이 없어요</div>}
      </div>

      <div className="section-title">빠른 기록</div>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:14}}>
        <QuickBtn icon="ti-map-pin" iconClass="icon-sage" label="산책 추가" onClick={() => onOpenModal({type:'walk'})} />
        <QuickBtn icon="ti-bone" iconClass="icon-mustard" label="사료/간식" onClick={() => onOpenModal({type:'food'})} />
        <QuickBtn icon="ti-heart" iconClass="icon-coral" label="건강 기록" onClick={() => onOpenModal({type:'health'})} />
        <QuickBtn icon="ti-calendar-plus" iconClass="icon-brown" label="디데이 추가" onClick={() => onOpenModal({type:'dday'})} />
      </div>
    </div>
  );
}

function QuickBtn({ icon, iconClass, label, onClick }){
  return (
    <button className="card" style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', border:'none', textAlign:'left', width:'100%'}} onClick={onClick}>
      <span className={`icon ${iconClass}`} style={{flexShrink:0}}><i className={`ti ${icon}`}></i></span>
      <span style={{fontWeight:700, fontSize:13}}>{label}</span>
    </button>
  );
}

// ---------- generic list page ----------
function ListPage({ title, icon, iconClass, items, render, empty }){
  return (
    <div>
      <div className="section-title">{title}</div>
      {items.length === 0 ? (
        <div className="card">
          <div className="empty">
            <span className="icon"><i className={`ti ${icon}`}></i></span>
            {empty}
          </div>
        </div>
      ) : (
        <div className="card">
          {items.map(item => render(item))}
        </div>
      )}
    </div>
  );
}

// ---------- health page (with poop color + weight) ----------
function HealthPage({ healthLogs, onDelete }){
  return (
    <div>
      <div className="section-title">건강 기록</div>
      {healthLogs.length === 0 ? (
        <div className="card">
          <div className="empty">
            <span className="icon"><i className="ti ti-heart"></i></span>
            건강/행동 기록이 없어요
          </div>
        </div>
      ) : (
        <div className="card">
          {healthLogs.map(h => (
            <div className="list-item" key={h.id}>
              <div className="left">
                <div className="label">{formatDate(h.date)} <span className="tag">{h.type}</span></div>
                <div style={{marginTop:6, display:'flex', gap:14, flexWrap:'wrap'}}>
                  {h.weight && (
                    <span style={{fontSize:12.5, fontWeight:700, color:'var(--coral-dark)'}}>
                      <i className="ti ti-scale" style={{marginRight:4}}></i>{h.weight}kg
                    </span>
                  )}
                  {h.poopColorName && (
                    <span style={{fontSize:12.5, fontWeight:700, color:'var(--brown)', display:'flex', alignItems:'center', gap:5}}>
                      <span className="poop-swatch" style={{background:h.poopColorHex}}></span>{h.poopColorName}
                    </span>
                  )}
                </div>
                {h.note && <div className="desc" style={{marginTop:6}}>{h.note}</div>}
              </div>
              <button className="delete-btn" onClick={() => onDelete(h.id)}><i className="ti ti-trash"></i></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Modals ----------
function ModalRouter({ modal, onClose, addWalk, addFood, addHealth, addDday, addVisit }){
  return (
    <div className="modal-overlay" onClick={(e) => { if(e.target === e.currentTarget) onClose(); }}>
      <div className="modal-sheet">
        <div className="modal-handle"></div>
        {modal.type === 'walk' && <WalkForm onSave={addWalk} onClose={onClose} />}
        {modal.type === 'food' && <FoodForm onSave={addFood} onClose={onClose} />}
        {modal.type === 'health' && <HealthForm onSave={addHealth} onClose={onClose} />}
        {modal.type === 'dday' && <DdayForm onSave={addDday} onClose={onClose} />}
        {modal.type === 'visit' && <VisitForm onSave={addVisit} onClose={onClose} />}
      </div>
    </div>
  );
}

function WalkForm({ onSave, onClose }){
  const [date, setDate] = useState(todayStr());
  const [route, setRoute] = useState('');
  const [duration, setDuration] = useState('');
  const [note, setNote] = useState('');

  const submit = () => {
    onSave({ date, route, duration, note });
    onClose();
  };

  return (
    <div>
      <div className="modal-title"><i className="ti ti-map-pin" style={{color:'var(--sage-dark)', marginRight:6}}></i>산책 기록 추가</div>
      <div className="form-row">
        <div className="form-group">
          <label>날짜</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
        </div>
        <div className="form-group">
          <label>소요 시간(분)</label>
          <input type="number" placeholder="예: 30" value={duration} onChange={e=>setDuration(e.target.value)} />
        </div>
      </div>
      <div className="form-group">
        <label>산책 경로</label>
        <input type="text" placeholder="예: 동네 공원 한 바퀴" value={route} onChange={e=>setRoute(e.target.value)} />
      </div>
      <div className="form-group">
        <label>메모</label>
        <textarea rows="2" placeholder="특이사항이 있었나요?" value={note} onChange={e=>setNote(e.target.value)}></textarea>
      </div>
      <button className="btn-primary" onClick={submit}>저장하기</button>
      <button className="btn-cancel" onClick={onClose}>취소</button>
    </div>
  );
}

function FoodForm({ onSave, onClose }){
  const [date, setDate] = useState(todayStr());
  const [type, setType] = useState('사료');
  const [name, setName] = useState('');
  const [amount, setAmount] = useState('');
  const [note, setNote] = useState('');

  const submit = () => {
    if(!name.trim()) return;
    onSave({ date, type, name, amount, note });
    onClose();
  };

  return (
    <div>
      <div className="modal-title"><i className="ti ti-bone" style={{color:'#B8862E', marginRight:6}}></i>사료 & 간식 추가</div>
      <div className="type-toggle">
        <div className={`type-btn ${type==='사료'?'active':''}`} onClick={()=>setType('사료')}>사료</div>
        <div className={`type-btn ${type==='간식'?'active':''}`} onClick={()=>setType('간식')}>간식</div>
        <div className={`type-btn ${type==='영양제'?'active':''}`} onClick={()=>setType('영양제')}>영양제</div>
      </div>
      <div className="form-group">
        <label>이름</label>
        <input type="text" placeholder="예: 닭고기 사료" value={name} onChange={e=>setName(e.target.value)} />
      </div>
      <div className="form-row">
        <div className="form-group">
          <label>날짜</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
        </div>
        <div className="form-group">
          <label>양 / 용량</label>
          <input type="text" placeholder="예: 100g" value={amount} onChange={e=>setAmount(e.target.value)} />
        </div>
      </div>
      <div className="form-group">
        <label>메모</label>
        <textarea rows="2" placeholder="반응이나 특이사항" value={note} onChange={e=>setNote(e.target.value)}></textarea>
      </div>
      <button className="btn-primary" onClick={submit}>저장하기</button>
      <button className="btn-cancel" onClick={onClose}>취소</button>
    </div>
  );
}

function HealthForm({ onSave, onClose }){
  const [date, setDate] = useState(todayStr());
  const [type, setType] = useState('건강');
  const [weight, setWeight] = useState('');
  const [poopColor, setPoopColor] = useState(null);
  const [note, setNote] = useState('');

  const submit = () => {
    if(!weight && !poopColor && !note.trim()) return;
    onSave({
      date, type, weight,
      poopColorName: poopColor ? poopColor.name : '',
      poopColorHex: poopColor ? poopColor.hex : '',
      note
    });
    onClose();
  };

  return (
    <div>
      <div className="modal-title"><i className="ti ti-heart" style={{color:'var(--coral-dark)', marginRight:6}}></i>건강 기록 추가</div>
      <div className="type-toggle">
        {HEALTH_TYPES.map(t => (
          <div key={t} className={`type-btn ${type===t?'active':''}`} onClick={()=>setType(t)}>{t}</div>
        ))}
      </div>
      <div className="form-row">
        <div className="form-group">
          <label>날짜</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
        </div>
        <div className="form-group">
          <label>체중 (kg) <span className="req">*</span></label>
          <input type="number" step="0.1" placeholder="예: 4.5" value={weight} onChange={e=>setWeight(e.target.value)} />
        </div>
      </div>
      <div className="form-group">
        <label>변 색깔 <span className="req">*</span></label>
        <div className="color-options">
          {POOP_COLORS.map(c => (
            <div
              key={c.name}
              className={`color-opt ${poopColor && poopColor.name===c.name ? 'selected':''}`}
              style={{background:c.hex}}
              title={c.name}
              onClick={() => setPoopColor(poopColor && poopColor.name===c.name ? null : c)}
            ></div>
          ))}
        </div>
        {poopColor && <div style={{marginTop:8, fontSize:12.5, fontWeight:700, color:'var(--brown)'}}>{poopColor.name}</div>}
      </div>
      <div className="form-group">
        <label>메모</label>
        <textarea rows="2" placeholder="건강이나 행동 관련 특이사항" value={note} onChange={e=>setNote(e.target.value)}></textarea>
      </div>
      <button className="btn-primary" onClick={submit}>저장하기</button>
      <button className="btn-cancel" onClick={onClose}>취소</button>
    </div>
  );
}

function VisitForm({ onSave, onClose }){
  const [date, setDate] = useState(todayStr());
  const [type, setType] = useState('병원');
  const [place, setPlace] = useState('');
  const [detail, setDetail] = useState('');

  return (
    <div>

      <div className="type-toggle">
        {VISIT_TYPES.map(t => (

        ))}
      </div>
      <div className="form-row">
        <div className="form-group">
          <label>날짜</label>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
        </div>
        <div className="form-group">
          <label>비용 (원)</label>
          <input type="number" placeholder="예: 35000" value={cost} onChange={e=>setCost(e.target.value)} />

      </div>
      <div className="form-group">
        <label>장소</label>
        <input type="text" placeholder="예: 행복동물병원" value={place} onChange={e=>setPlace(e.target.value)} />
      </div>
      <div className="form-group">
        <label>내용 <span className="req">*</span></label>
        <textarea rows="3" placeholder="진료 내용, 시술, 미용 스타일 등 자세히 적어주세요" value={detail} onChange={e=>setDetail(e.target.value)}></textarea>
